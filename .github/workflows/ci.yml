name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 검증 (check + lint + build + a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps

      - name: 컨트랙트 위반 검사 (R-01~R-14) — 토큰/BEM/접근성
        run: node scripts/check-violations.js

      - name: HTML 구조 검사 (R-15~R-18) — root 태그/ARIA/상태 클래스/modifier
        run: node scripts/check-html-structure.js

      - name: KRDS+INFOMIND 토큰 빌드
        run: npm run build:tokens

      - name: Stylelint
        run: npm run lint:css

      - name: 검사기 단위 테스트
        run: npm run test:unit

      - name: 규칙 자동 생성 검증 (rules.json → CLAUDE.md/conventions/)
        run: npm run build:rules

      - name: AI 프롬프트 자동 생성 검증
        run: npm run build:prompts

      - name: info-design 스킬 빌드 검증
        run: npm run build:skill

      - name: 스타터 로컬 동기화 및 하네스 검증
        run: |
          npm run sync:starter
          npm run check:harness
          (cd starter && npm run check)

      - name: 자동 생성물 drift 검사
        run: |
          # 빌드 sha 라인은 매 커밋마다 다르므로 검사에서 제외 (정보성 메타이며 콘텐츠 결정성과 무관)
          # -I <regex>: 매칭 라인 변경만 있는 hunk는 diff에서 무시 (git 2.30+)
          if ! git diff --exit-code -I '^> 빌드: ' -I '"sha":' -- CLAUDE.md AGENTS.md site/conventions/ site/prompts/ prompts/ skill/references/krds-tokens.md skill/references/krds-components.md tokens/build/ starter/; then
            echo ""
            echo "❌ 자동 생성물이 최신이 아닙니다."
            echo "   다음 명령을 실행하고 결과를 커밋하세요:"
            echo ""
            echo "   npm run build:tokens && npm run build:rules && npm run build:prompts && npm run build:skill"
            echo ""
            exit 1
          fi

      - name: Tailwind v4 CSS 빌드
        run: |
          npm run build:css
          npm run build:docs-css

      - name: Eleventy 사이트 빌드
        run: npx @11ty/eleventy

      - name: 접근성 검증 (pa11y-ci, KWCAG/WCAG 2.1 AA)
        run: |
          npx puppeteer browsers install chrome
          npx pa11y-ci --config .pa11yci.js
